<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us | CAFO</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #F8F8F8;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 2rem;
      text-align: center;
    }

    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: 4rem;
      margin-bottom: 2rem;
      color: #1a1a1a;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #666;
    }

    .contact-info {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }

    .email {
      font-size: 1.5rem;
      color: #d4a574;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: #0B0C10;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: #d4a574;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you! Get in touch with any questions about CAFO.</p>
    
    <div class="contact-info">
      <a href="mailto:hello@cafo.se" class="email">hello@cafo.se</a>
    </div>
    
    <a href="index.html" class="back-link">Back to Home</a>
  </div>
</body>
</html>
